version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: scriptbook_postgres
    restart: always
    environment:
      POSTGRES_USER: scriptuser
      POSTGRES_PASSWORD: scriptpassword
      POSTGRES_DB: scriptbook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  pgadmin:
    image: dpage/pgadmin4
    container_name: scriptbook_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@scriptbook.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
